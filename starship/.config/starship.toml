# Cosmic Red Starship Theme
# Matches WezTerm/Zellij/Helix "Cosmic Red" aesthetic

# Palette:
# - Background: #030004 (Deep Black/Purple)
# - Red Accent: #B12142
# - Text: #e0e0e0
# - Muted Blue: #6C7A96
# - Muted Green: #76946A
# - Muted Yellow: #D7A55C
# - Dark Grey: #1c1c1c (Secondary BG)

format = "[](#B12142)$os$username[](bg:#1c1c1c fg:#B12142)$directory[](fg:#1c1c1c bg:#394e6b)$git_branch$git_status[](fg:#394e6b bg:#030004)$c$elixir$elm$golang$gradle$haskell$java$julia$nodejs$nim$rust$scala$docker_context$python[](fg:#030004 bg:#6C7A96)$time[ ](fg:#6C7A96)"

# Disable the blank line at the start of the prompt
add_newline = true

[username]
show_always = true
style_user = "bg:#B12142 fg:#030004 bold"
style_root = "bg:#B12142 fg:#030004 bold"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:#B12142 fg:#030004"
disabled = true 

[directory]
style = "bg:#1c1c1c fg:#e0e0e0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#394e6b fg:#e0e0e0"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#394e6b fg:#e0e0e0"
format = '[$all_status$ahead_behind ]($style)'

# Language Modules - Floating on the dark background
[c]
symbol = " "
style = "bg:#030004 fg:#76946A"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bg:#030004 fg:#76946A"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:#030004 fg:#6C7A96"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "bg:#030004 fg:#957FB8"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bg:#030004 fg:#7FA2AC"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = " "
style = "bg:#030004 fg:#7FA2AC"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:#030004 fg:#D7A55C"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bg:#030004 fg:#957FB8"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:#030004 fg:#D7A55C"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:#030004 fg:#957FB8"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#030004 fg:#76946A"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bg:#030004 fg:#D7A55C"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#030004 fg:#D7A55C"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:#030004 fg:#D7A55C"
format = '[ $symbol ($version) ]($style)'

[python]
format = '[ ${symbol}${virtualenv} ]($style)'
symbol = "󰌠 "
style = "bg:#030004 fg:#D7A55C"

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#6C7A96 fg:#030004"
format = '[ ♥ $time ]($style)'
